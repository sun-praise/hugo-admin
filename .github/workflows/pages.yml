name: Deploy MkDocs to GitHub Pages

# 触发：main 分支推送（限定 docs/、mkdocs.yml、workflow 文件）+ 手动 dispatch
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# 同一部署并发：旧构建未完成时不打断，等它跑完再发新的
concurrency:
  group: pages
  cancel-in-progress: false

# 最小权限：pages 写、id-token 签发（deploy-pages 需要）
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          # 与 lock 保持一致，避免意外漂移到不同 Python 版本
          python-version: '3.11'

      - name: Cache uv packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-3.11-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-3.11-

      - name: Install docs dependencies
        run: uv sync --extra docs --no-dev

      - name: Build (strict)
        run: uv run mkdocs build --strict

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
