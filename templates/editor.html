{% extends "base.html" %}

{% set current_file = file_path %}

{% block title %}编辑器 - Hugo Blog 管理{% endblock %}
{% block page_title %}文章编辑器{% endblock %}

{% block extra_head %}
<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
<!-- Highlight.js for code syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
<style>
    /* 编辑器容器 */
    .editor-container {
        height: calc(100vh - 250px);
        min-height: 500px;
    }

    /* Textarea 编辑器样式 */
    #markdown-editor {
        width: 100%;
        height: 100%;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', 'source-code-pro', monospace;
        font-size: 14px;
        line-height: 1.6;
        padding: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        resize: none;
        outline: none;
        background: #ffffff;
    }

    #markdown-editor:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* 预览区域样式 */
    .preview-container {
        height: 100%;
        overflow-y: auto;
        padding: 1rem;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        background: #ffffff;
    }

    /* Markdown 内容样式 */
    .markdown-body {
        font-size: 16px;
        line-height: 1.6;
        color: #24292e;
    }

    .markdown-body h1 {
        font-size: 2em;
        font-weight: 600;
        margin-top: 24px;
        margin-bottom: 16px;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #eaecef;
    }

    .markdown-body h2 {
        font-size: 1.5em;
        font-weight: 600;
        margin-top: 24px;
        margin-bottom: 16px;
        padding-bottom: 0.3em;
        border-bottom: 1px solid #eaecef;
    }

    .markdown-body h3 {
        font-size: 1.25em;
        font-weight: 600;
        margin-top: 24px;
        margin-bottom: 16px;
    }

    .markdown-body p {
        margin-top: 0;
        margin-bottom: 16px;
    }

    .markdown-body ul, .markdown-body ol {
        margin-top: 0;
        margin-bottom: 16px;
        padding-left: 2em;
    }

    .markdown-body ul {
        list-style-type: disc;
    }

    .markdown-body ol {
        list-style-type: decimal;
    }

    .markdown-body li {
        margin-top: 0.25em;
    }

    .markdown-body pre {
        background-color: #f6f8fa;
        border-radius: 6px;
        padding: 16px;
        overflow: auto;
        margin-bottom: 16px;
    }

    .markdown-body code {
        background-color: rgba(175,184,193,0.2);
        padding: 0.2em 0.4em;
        border-radius: 6px;
        font-size: 85%;
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', 'Consolas', monospace;
    }

    .markdown-body pre code {
        background-color: transparent;
        padding: 0;
    }

    .markdown-body blockquote {
        margin: 0 0 16px 0;
        padding: 0 1em;
        color: #6a737d;
        border-left: 0.25em solid #dfe2e5;
    }

    .markdown-body a {
        color: #0366d6;
        text-decoration: none;
    }

    .markdown-body a:hover {
        text-decoration: underline;
    }

    .markdown-body table {
        border-collapse: collapse;
        margin-bottom: 16px;
        width: 100%;
    }

    .markdown-body table th,
    .markdown-body table td {
        border: 1px solid #dfe2e5;
        padding: 6px 13px;
    }

    .markdown-body table th {
        font-weight: 600;
        background-color: #f6f8fa;
    }

    .markdown-body img {
        max-width: 100%;
        height: auto;
    }

    .markdown-body hr {
        height: 0.25em;
        padding: 0;
        margin: 24px 0;
        background-color: #e1e4e8;
        border: 0;
    }

    /* Frontmatter 抽屉样式 */
    .fm-drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 40;
    }

    .fm-drawer {
        position: fixed;
        top: 0;
        right: 0;
        width: 420px;
        max-width: 90vw;
        height: 100vh;
        background: white;
        box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
        z-index: 50;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
    }

    .fm-field label {
        display: block;
        font-size: 0.8rem;
        font-weight: 600;
        color: #4b5563;
        margin-bottom: 4px;
    }

    .fm-field input, .fm-field select {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border: 1px solid #d1d5db;
        border-radius: 0.375rem;
        font-size: 0.875rem;
        outline: none;
        transition: border-color 0.2s;
    }

    .fm-field input:focus, .fm-field select:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* 工具栏按钮样式 */
    .toolbar-btn {
        padding: 0.5rem 1rem;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 0.375rem;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 14px;
        color: #374151;
    }

    .toolbar-btn:hover {
        background: #f3f4f6;
        border-color: #d1d5db;
    }

    .toolbar-btn:active {
        background: #e5e7eb;
    }
</style>
{% endblock %}

{% block content %}
<div x-data="editor()" x-init="init()" x-cloak>
    <!-- 工具栏 -->
    <div class="bg-white rounded-lg shadow p-4 mb-4">
        <div class="flex items-center justify-between mb-4">
            <div class="flex items-center space-x-4">
                <div>
                    <label class="text-sm font-medium text-gray-700">当前文件:</label>
                    <span x-text="currentFile || '未选择文件'" class="ml-2 text-gray-600"></span>
                </div>
            </div>

            <div class="flex items-center space-x-2">
                <!-- Frontmatter 编辑按钮 -->
                <button @click="showFrontmatterDrawer = true"
                        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
                    </svg>
                    Frontmatter
                </button>

                <!-- 图片管理按钮 -->
                <button @click="showImageManager = !showImageManager"
                        class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                    </svg>
                    图片管理
                </button>

                <!-- 保存按钮 -->
                <button @click="saveFile"
                        :disabled="saving || !hasChanges"
                        :class="{'opacity-50 cursor-not-allowed': saving || !hasChanges}"
                        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/>
                    </svg>
                    <span x-text="saving ? '保存中...' : (hasChanges ? '保存 (Ctrl+S)' : '已保存')"></span>
                </button>

                <!-- 发布按钮 -->
                <button id="publish-btn"
                        @click="publishArticle"
                        :disabled="publishing || !currentFile"
                        :class="{
                            'opacity-50 cursor-not-allowed': publishing || !currentFile,
                            'bg-green-600 hover:bg-green-700': !isPublished,
                            'bg-gray-400 hover:bg-gray-500': isPublished
                        }"
                        class="px-4 py-2 text-white rounded-lg transition-colors flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                    </svg>
                    <span x-text="publishing ? '发布中...' : (isPublished ? '已发布' : '发布')"></span>
                </button>

                <!-- 发布状态显示 -->
                <div id="publish-status" class="text-sm"></div>
            </div>
        </div>

        <!-- 图片管理面板 -->
        <div x-show="showImageManager" x-transition class="border-t pt-4">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-900">图片管理</h3>
                <label class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg cursor-pointer transition-colors">
                    <input type="file" @change="uploadImage($event)" accept="image/*" class="hidden">
                    上传图片
                </label>
            </div>

            <!-- 图片列表 -->
            <div class="grid grid-cols-4 gap-4">
                <template x-for="image in images" :key="image.name">
                    <div class="relative group">
                        <img :src="'/content/' + currentFile.replace(/[^/]+$/, '') + image.url"
                             :alt="image.name"
                             class="w-full h-32 object-cover rounded border border-gray-200">
                        <div class="absolute inset-0 bg-black bg-opacity-50 opacity-0 group-hover:opacity-100 transition-opacity rounded flex items-center justify-center z-10">
                            <button @click.prevent="copyImageUrl(image.url)"
                                    class="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded mr-2 cursor-pointer shadow-lg">
                                复制链接
                            </button>
                        </div>
                        <div class="mt-1 text-xs text-gray-600 truncate" x-text="image.name"></div>
                    </div>
                </template>
            </div>

            <p x-show="images.length === 0" class="text-gray-500 text-center py-8">
                暂无图片，点击"上传图片"开始上传
            </p>
        </div>
    </div>

    <!-- Markdown 工具栏 -->
    <div class="bg-white rounded-lg shadow p-3 mb-4">
        <div class="flex flex-wrap gap-2">
            <button @click="insertMarkdown('bold')" class="toolbar-btn" title="加粗 (Ctrl+B)">
                <strong>B</strong>
            </button>
            <button @click="insertMarkdown('italic')" class="toolbar-btn" title="斜体 (Ctrl+I)">
                <em>I</em>
            </button>
            <button @click="insertMarkdown('heading')" class="toolbar-btn" title="标题">
                H
            </button>
            <span class="border-l border-gray-300 mx-1"></span>
            <button @click="insertMarkdown('link')" class="toolbar-btn" title="链接">
                🔗 链接
            </button>
            <button @click="insertMarkdown('image')" class="toolbar-btn" title="图片">
                🖼️ 图片
            </button>
            <span class="border-l border-gray-300 mx-1"></span>
            <button @click="insertMarkdown('ul')" class="toolbar-btn" title="无序列表">
                • 列表
            </button>
            <button @click="insertMarkdown('ol')" class="toolbar-btn" title="有序列表">
                1. 列表
            </button>
            <button @click="insertMarkdown('quote')" class="toolbar-btn" title="引用">
                " 引用
            </button>
            <button @click="insertMarkdown('code')" class="toolbar-btn" title="代码">
                &lt;/&gt; 代码
            </button>
            <button @click="insertMarkdown('table')" class="toolbar-btn" title="表格">
                ⊞ 表格
            </button>
        </div>
    </div>

    <!-- 编辑器和预览 -->
    <div class="bg-white rounded-lg shadow p-4">
        <div class="grid grid-cols-2 gap-4 editor-container">
            <!-- 编辑器 -->
            <div>
                <div class="text-sm font-medium text-gray-700 mb-2">编辑器</div>
                <textarea
                    id="markdown-editor"
                    x-model="content"
                    @input="updatePreview(); checkChanges()"
                    placeholder="在此输入 Markdown 内容..."
                ></textarea>
            </div>

            <!-- 预览 -->
            <div>
                <div class="text-sm font-medium text-gray-700 mb-2">预览</div>
                <div class="preview-container">
                    <div class="markdown-body" x-html="preview"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Frontmatter 抽屉 -->
    <div x-show="showFrontmatterDrawer" x-transition.opacity class="fm-drawer-overlay" @click="showFrontmatterDrawer = false"></div>
    <div x-show="showFrontmatterDrawer"
         x-transition:enter="transition transform duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition transform duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fm-drawer">
        <!-- 抽屉头部 -->
        <div class="flex items-center justify-between p-4 border-b">
            <h3 class="text-lg font-semibold text-gray-900">Frontmatter</h3>
            <button @click="showFrontmatterDrawer = false" class="text-gray-400 hover:text-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- 抽屉内容 -->
        <div class="flex-1 overflow-y-auto p-4 space-y-4">
            <div class="fm-field">
                <label>title</label>
                <input type="text" x-model="fmEdit.title" placeholder="文章标题">
            </div>

            <div class="fm-field">
                <label>date</label>
                <input type="text" x-model="fmEdit.date" placeholder="2024-01-01T00:00:00+08:00">
            </div>

            <div class="fm-field">
                <label>draft</label>
                <select x-model="fmEdit.draft">
                    <option value="true">true (草稿)</option>
                    <option value="false">false (已发布)</option>
                </select>
            </div>

            <div class="fm-field">
                <label>tags (逗号分隔)</label>
                <input type="text" x-model="fmTagsStr" placeholder="tag1, tag2">
            </div>

            <div class="fm-field">
                <label>categories (逗号分隔)</label>
                <input type="text" x-model="fmCategoriesStr" placeholder="cat1, cat2">
            </div>

            <div class="fm-field">
                <label>cover</label>
                <input type="text" x-model="fmEdit.cover" placeholder="封面图片路径">
            </div>

            <div class="fm-field">
                <label>description</label>
                <input type="text" x-model="fmEdit.description" placeholder="文章描述">
            </div>

            <!-- 额外字段 -->
            <div class="border-t pt-4">
                <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-semibold text-gray-600">其他字段</label>
                    <button @click="fmExtraFields.push({key: '', value: ''})" class="text-sm text-blue-600 hover:text-blue-700">+ 添加字段</button>
                </div>
                <template x-for="(field, i) in fmExtraFields" :key="i">
                    <div class="flex items-center space-x-2 mb-2">
                        <input type="text" x-model="field.key" placeholder="key" class="w-1/3 px-2 py-1 border rounded text-sm">
                        <input type="text" x-model="field.value" placeholder="value" class="flex-1 px-2 py-1 border rounded text-sm">
                        <button @click="fmExtraFields.splice(i, 1)" class="text-red-400 hover:text-red-600">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </button>
                    </div>
                </template>
            </div>
        </div>

        <!-- 抽屉底部 -->
        <div class="p-4 border-t flex justify-end space-x-2">
            <button @click="showFrontmatterDrawer = false" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50">取消</button>
            <button @click="applyFrontmatter()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">应用</button>
        </div>
    </div>

    <!-- 加载状态 -->
    <template x-if="loading">
        <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
            <div class="bg-white rounded-lg p-8 text-center">
                <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-4"></div>
                <p class="text-gray-700">加载中...</p>
            </div>
        </div>
    </template>
</div>

<script>
function editor() {
    return {
        currentFile: '{% if file_path %}{{ file_path }}{% endif %}',
        content: '',
        originalContent: '',
        preview: '',
        hasChanges: false,
        loading: false,
        saving: false,
        publishing: false,
        isPublished: false,
        showImageManager: false,
        showFrontmatterDrawer: false,
        frontmatter: {},
        originalFrontmatter: {},
        fmEdit: {},
        fmTagsStr: '',
        fmCategoriesStr: '',
        fmExtraFields: [],
        images: [],

        async init() {
            // 配置 marked.js
            marked.setOptions({
                breaks: true,
                gfm: true,
                highlight: function(code, lang) {
                    if (lang && hljs.getLanguage(lang)) {
                        try {
                            return hljs.highlight(code, { language: lang }).value;
                        } catch (err) {}
                    }
                    return code;
                }
            });

            // 如果有文件路径，加载文件
            if (this.currentFile) {
                await this.loadFile(this.currentFile);
                await this.loadImages();
            }

            // 添加快捷键
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (this.hasChanges && !this.saving) {
                        this.saveFile();
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
                    e.preventDefault();
                    this.insertMarkdown('bold');
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
                    e.preventDefault();
                    this.insertMarkdown('italic');
                }
            });

            // 添加剪贴板粘贴事件监听器
            const editor = document.getElementById('markdown-editor');
            editor.addEventListener('paste', (e) => {
                this.handlePaste(e);
            });
        },

        checkChanges() {
            this.hasChanges = this.content !== this.originalContent
                || JSON.stringify(this.frontmatter) !== JSON.stringify(this.originalFrontmatter);
        },

        syncFmEdit() {
            this.fmEdit = {};
            const reserved = ['tags', 'categories'];
            for (const [k, v] of Object.entries(this.frontmatter)) {
                if (!reserved.includes(k)) {
                    this.fmEdit[k] = typeof v === 'boolean' ? String(v) : v;
                }
            }
            // Ensure core fields exist
            if (!this.fmEdit.title) this.fmEdit.title = '';
            if (!this.fmEdit.date) this.fmEdit.date = '';
            if (!this.fmEdit.draft) this.fmEdit.draft = 'true';
            if (!this.fmEdit.cover) this.fmEdit.cover = '';
            if (!this.fmEdit.description) this.fmEdit.description = '';

            this.fmTagsStr = Array.isArray(this.frontmatter.tags)
                ? this.frontmatter.tags.join(', ') : (this.frontmatter.tags || '');
            this.fmCategoriesStr = Array.isArray(this.frontmatter.categories)
                ? this.frontmatter.categories.join(', ') : (this.frontmatter.categories || '');

            // Collect extra (non-core) fields
            const coreKeys = ['title', 'date', 'draft', 'tags', 'categories', 'cover', 'description'];
            this.fmExtraFields = [];
            for (const [k, v] of Object.entries(this.frontmatter)) {
                if (!coreKeys.includes(k)) {
                    this.fmExtraFields.push({ key: k, value: typeof v === 'object' ? JSON.stringify(v) : String(v) });
                    delete this.fmEdit[k];
                }
            }
        },

        applyFrontmatter() {
            const fm = {};
            // Core fields
            for (const [k, v] of Object.entries(this.fmEdit)) {
                if (v !== '' && v !== undefined && v !== null) {
                    if (k === 'draft') {
                        fm[k] = v === 'true';
                    } else {
                        fm[k] = v;
                    }
                }
            }
            // Tags
            if (this.fmTagsStr.trim()) {
                fm.tags = this.fmTagsStr.split(',').map(s => s.trim()).filter(Boolean);
            }
            // Categories
            if (this.fmCategoriesStr.trim()) {
                fm.categories = this.fmCategoriesStr.split(',').map(s => s.trim()).filter(Boolean);
            }
            // Extra fields
            for (const field of this.fmExtraFields) {
                if (field.key.trim()) {
                    fm[field.key.trim()] = field.value;
                }
            }
            this.frontmatter = fm;
            this.showFrontmatterDrawer = false;
            this.checkChanges();
        },

        updatePreview() {
            let html = marked.parse(this.content || '');

            // 修复图片路径
            if (this.currentFile) {
                const articleDir = this.currentFile.replace(/[^/]+$/, '');
                html = html.replace(/<img\s+src="([^"]+)"/g, (match, src) => {
                    if (!src.startsWith('http://') && !src.startsWith('https://') && !src.startsWith('/')) {
                        src = `/content/${articleDir}${src}`;
                    }
                    return `<img src="${src}"`;
                });
            }

            this.preview = html;
        },

        insertMarkdown(type) {
            const textarea = document.getElementById('markdown-editor');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const selectedText = this.content.substring(start, end);
            let insertion = '';
            let cursorOffset = 0;

            switch(type) {
                case 'bold':
                    insertion = `**${selectedText || '粗体文本'}**`;
                    cursorOffset = selectedText ? insertion.length : 2;
                    break;
                case 'italic':
                    insertion = `*${selectedText || '斜体文本'}*`;
                    cursorOffset = selectedText ? insertion.length : 1;
                    break;
                case 'heading':
                    insertion = `## ${selectedText || '标题'}`;
                    cursorOffset = selectedText ? insertion.length : 3;
                    break;
                case 'link':
                    insertion = `[${selectedText || '链接文本'}](url)`;
                    cursorOffset = selectedText ? insertion.length - 4 : insertion.length - 5;
                    break;
                case 'image':
                    insertion = `![${selectedText || '图片描述'}](图片地址)`;
                    cursorOffset = selectedText ? insertion.length - 6 : insertion.length - 11;
                    break;
                case 'ul':
                    insertion = `- ${selectedText || '列表项'}`;
                    cursorOffset = insertion.length;
                    break;
                case 'ol':
                    insertion = `1. ${selectedText || '列表项'}`;
                    cursorOffset = insertion.length;
                    break;
                case 'quote':
                    insertion = `> ${selectedText || '引用内容'}`;
                    cursorOffset = insertion.length;
                    break;
                case 'code':
                    if (selectedText.includes('\n')) {
                        insertion = `\`\`\`\n${selectedText || '代码'}\n\`\`\``;
                        cursorOffset = selectedText ? insertion.length - 4 : 4;
                    } else {
                        insertion = `\`${selectedText || '代码'}\``;
                        cursorOffset = selectedText ? insertion.length : 1;
                    }
                    break;
                case 'table':
                    insertion = `| 列1 | 列2 | 列3 |\n| --- | --- | --- |\n| 内容 | 内容 | 内容 |`;
                    cursorOffset = insertion.length;
                    break;
            }

            this.content = this.content.substring(0, start) + insertion + this.content.substring(end);
            this.$nextTick(() => {
                textarea.focus();
                textarea.setSelectionRange(start + cursorOffset, start + cursorOffset);
                this.updatePreview();
                this.checkChanges();
            });
        },

        async loadFile() {
            this.loading = true;
            try {
                const response = await fetch('/api/file/read-with-frontmatter', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: this.currentFile })
                });

                const data = await response.json();
                if (data.success) {
                    this.content = data.content;
                    this.originalContent = data.content;
                    this.frontmatter = data.frontmatter || {};
                    this.originalFrontmatter = JSON.parse(JSON.stringify(this.frontmatter));
                    this.syncFmEdit();
                    this.updatePreview();
                    this.hasChanges = false;

                    await this.checkPublishStatus();
                } else {
                    utils.showNotification('加载文件失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Failed to load file:', error);
                utils.showNotification('加载文件失败', 'error');
            } finally {
                this.loading = false;
            }
        },

        async saveFile() {
            if (!this.currentFile) {
                utils.showNotification('未选择文件', 'error');
                return;
            }

            this.saving = true;
            try {
                const response = await fetch('/api/file/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: this.currentFile,
                        content: this.content,
                        frontmatter: this.frontmatter
                    })
                });

                const data = await response.json();
                if (data.success) {
                    this.originalContent = this.content;
                    this.originalFrontmatter = JSON.parse(JSON.stringify(this.frontmatter));
                    this.hasChanges = false;
                    utils.showNotification('保存成功', 'success');
                } else {
                    utils.showNotification('保存失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Failed to save file:', error);
                utils.showNotification('保存失败', 'error');
            } finally {
                this.saving = false;
            }
        },

        async publishArticle() {
            if (!this.currentFile) {
                utils.showNotification('未选择文件', 'error');
                return;
            }

            // 确认发布操作
            if (!confirm('确定要发布这篇文章吗？发布后将无法撤销草稿状态。')) {
                return;
            }

            this.publishing = true;
            try {
                const response = await fetch('/api/article/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        file_path: this.currentFile
                    })
                });

                const data = await response.json();
                if (data.success) {
                    this.isPublished = true;
                    utils.showNotification('文章发布成功！', 'success');

                    // 更新发布状态显示
                    this.updatePublishStatus('success', '文章已成功发布');
                } else {
                    utils.showNotification('发布失败: ' + data.error, 'error');
                    this.updatePublishStatus('error', data.error);
                }
            } catch (error) {
                console.error('Failed to publish article:', error);
                utils.showNotification('发布失败', 'error');
                this.updatePublishStatus('error', '发布请求失败');
            } finally {
                this.publishing = false;
            }
        },

        async checkPublishStatus() {
            if (!this.currentFile) return;

            try {
                const response = await fetch(`/api/article/status?file_path=${encodeURIComponent(this.currentFile)}`);
                const data = await response.json();

                if (data.success) {
                    this.isPublished = !data.status.is_draft;
                }
            } catch (error) {
                console.error('Failed to check publish status:', error);
            }
        },

        updatePublishStatus(type, message) {
            const statusElement = document.getElementById('publish-status');
            if (statusElement) {
                if (type === 'success') {
                    statusElement.className = 'text-sm text-green-600 mt-1';
                    statusElement.textContent = message;
                } else if (type === 'error') {
                    statusElement.className = 'text-sm text-red-600 mt-1';
                    statusElement.textContent = message;
                } else {
                    statusElement.className = 'text-sm text-gray-600 mt-1';
                    statusElement.textContent = message;
                }

                // 3秒后清除状态消息
                setTimeout(() => {
                    statusElement.textContent = '';
                }, 3000);
            }
        },

        async loadImages() {
            if (!this.currentFile) return;

            try {
                const response = await fetch('/api/image/list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ article_path: this.currentFile })
                });

                const data = await response.json();
                if (data.success) {
                    this.images = data.images;
                }
            } catch (error) {
                console.error('Failed to load images:', error);
            }
        },

        async uploadImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('article_path', this.currentFile);

            try {
                const response = await fetch('/api/image/upload', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.success) {
                    utils.showNotification('图片上传成功', 'success');
                    await this.loadImages();
                    event.target.value = '';
                } else {
                    utils.showNotification('上传失败: ' + data.message, 'error');
                }
            } catch (error) {
                console.error('Failed to upload image:', error);
                utils.showNotification('上传失败', 'error');
            }
        },

        copyImageUrl(imageUrl) {
            const markdownImage = `![](${imageUrl})`;

            // 优先使用现代 clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(markdownImage).then(() => {
                    utils.showNotification('已复制 Markdown 图片语法', 'success');
                }).catch((err) => {
                    console.error('Failed to copy:', err);
                    // 降级到传统方法
                    this.fallbackCopyToClipboard(markdownImage);
                });
            } else {
                // 使用传统方法
                this.fallbackCopyToClipboard(markdownImage);
            }
        },

        fallbackCopyToClipboard(text) {
            // 传统的复制方法（兼容性更好）
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();

            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    utils.showNotification('已复制 Markdown 图片语法', 'success');
                } else {
                    utils.showNotification('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                console.error('Fallback copy failed:', err);
                utils.showNotification('复制失败: ' + err.message, 'error');
            } finally {
                document.body.removeChild(textArea);
            }
        },

        async handlePaste(event) {
            // 检查剪贴板中是否有图片
            const items = event.clipboardData?.items;
            if (!items) return;

            let hasImage = false;
            for (let i = 0; i < items.length; i++) {
                const item = items[i];

                // 检查是否为图片类型
                if (item.type.indexOf('image') !== -1) {
                    hasImage = true;
                    event.preventDefault(); // 阻止默认粘贴行为

                    // 获取图片文件
                    const file = item.getAsFile();
                    if (!file) continue;

                    // 检查是否有当前文件
                    if (!this.currentFile) {
                        utils.showNotification('请先选择或创建一篇文章', 'error');
                        return;
                    }

                    // 显示上传提示
                    utils.showNotification('正在上传图片...', 'info');

                    try {
                        // 上传图片
                        const formData = new FormData();
                        formData.append('file', file, `clipboard-${Date.now()}.png`);
                        formData.append('article_path', this.currentFile);

                        const response = await fetch('/api/image/upload', {
                            method: 'POST',
                            body: formData
                        });

                        const data = await response.json();
                        if (data.success) {
                            // 插入图片 Markdown 语法到光标位置
                            this.insertImageAtCursor(data.url);
                            utils.showNotification('图片上传成功', 'success');

                            // 刷新图片列表
                            await this.loadImages();
                        } else {
                            utils.showNotification('图片上传失败: ' + data.message, 'error');
                        }
                    } catch (error) {
                        console.error('Failed to upload image from clipboard:', error);
                        utils.showNotification('图片上传失败', 'error');
                    }

                    break; // 只处理第一个图片
                }
            }
        },

        insertImageAtCursor(imageUrl) {
            const textarea = document.getElementById('markdown-editor');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;

            // 生成 Markdown 图片语法
            const imageMarkdown = `![](${imageUrl})`;

            // 在光标位置插入图片
            this.content = this.content.substring(0, start) + imageMarkdown + this.content.substring(end);

            // 更新预览和变更状态
            this.$nextTick(() => {
                textarea.focus();
                const newCursorPos = start + imageMarkdown.length;
                textarea.setSelectionRange(newCursorPos, newCursorPos);
                this.updatePreview();
                this.checkChanges();
            });
        },

    };
}
</script>
